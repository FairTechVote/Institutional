spring.application.name=institutional-app

#DataSource Configuration

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.url=${DATABASE_URL}
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Server Configuration

server.port=8080

#Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.springapi=DEBUG

# JWT
jwt.prefix=Bearer
jwt.secret=secret
jwt.header=Authorization
jwt.expiration=86400000

#Spring session
spring.session.jdbc.initialize-schema=always

# Swagger
swagger.api.title=Fairtech Vote
swagger.api.description=API institucional do Fairtech Vote
swagger.api.version=1.0
swagger.api.contact.name=Kevin da Costa Vinagre
swagger.api.contact.email=lkevinvinagre@hotmail.com

# CORS
cors.allowed.origins=*
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=Authorization,Content-Type
cors.exposed.headers=Authorization
cors.allow.credentials=true
cors.max.age=3600

#Security
spring.security.user.name=admin
